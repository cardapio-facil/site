<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Painel - Delivery Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/painel.css">
</head>
<body>

<!-- ========== MODAL LOGIN ========== -->
<div class="modal-login-overlay" id="modalLogin">
    <div class="modal-login-box">
        <h2>🔐 Acesso Restrito</h2>
        <div class="senha-container">
            <input type="password" id="senhaInput" placeholder="Digite a senha" onkeypress="if(event.key==='Enter') verificarSenha()">
            <button class="btn-olho" onclick="toggleOlho()" id="btnOlho" title="Mostrar senha">
                <i class="fas fa-eye-slash"></i>
            </button>
        </div>
        <div class="lembrar-container" onclick="document.getElementById('lembrarCheck').click()">
            <input type="checkbox" id="lembrarCheck">
            <label for="lembrarCheck">Lembrar senha</label>
        </div>
        <button class="btn-entrar" onclick="verificarSenha()">
            <i class="fas fa-sign-in-alt"></i> ENTRAR
        </button>
    </div>
</div>

<!-- ===== SIDEBAR OVERLAY ===== -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3>⚙️ Menu Rápido</h3>
        <button class="sidebar-close" onclick="toggleSidebar()">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <nav class="sidebar-menu">
        <!-- Preenchido dinamicamente pelo painel-app.js -->
    </nav>
</aside>

<!-- ===== MAIN CONTENT ===== -->
<main class="main-content" id="mainContent">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <button class="hamburger-btn" onclick="toggleSidebar()" title="Menu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo-container">
                <img id="logoPainel" src="" alt="Logo"
                     onerror="this.src='https://png.pngtree.com/png-clipart/20200727/original/pngtree-pin-food-delivery-map-location-delivery-logo-concept-png-image_5137624.jpg'">
            </div>
            <div>
                <h1>📊 Painel - Delivery Pro</h1>
                <p id="dataAtual"></p>
            </div>
        </div>
    </div>

    <!-- STATUS BOXES -->
    <div class="status-container">
        <div class="status-box novos ativo" onclick="filtrarPorStatus('novo', this)">
            <div class="numero" id="totalNovos">0</div>
            <div class="label">Novos</div>
            <div class="status-indicator" style="background:#4CAF50;"></div>
        </div>
        <div class="status-box preparando" onclick="filtrarPorStatus('preparando', this)">
            <div class="numero" id="totalPreparando">0</div>
            <div class="label">Preparando</div>
            <div class="status-indicator" style="background:#FFC107;"></div>
        </div>
        <div class="status-box saiu" onclick="filtrarPorStatus('saiu_entrega', this)">
            <div class="numero" id="totalSaiu">0</div>
            <div class="label">Saiu</div>
            <div class="status-indicator" style="background:#FF9800;"></div>
        </div>
        <div class="status-box entregue" onclick="filtrarPorStatus('entregue', this)">
            <div class="numero" id="totalEntregue">0</div>
            <div class="label">Entregues</div>
            <div class="status-indicator" style="background:#9C27B0;"></div>
        </div>
        <div class="status-box cancelado" onclick="filtrarPorStatus('cancelado', this)">
            <div class="numero" id="totalCancelado">0</div>
            <div class="label">Cancelados</div>
            <div class="status-indicator" style="background:#dc3545;"></div>
        </div>
    </div>

    <!-- GRID DE PEDIDOS -->
    <div class="pedidos-grid" id="pedidosGrid">
        <div style="grid-column:1/-1; text-align:center; padding:40px; color:#aaa;">
            Carregando pedidos...
        </div>
    </div>

</main>

<!-- ===== MODAL DETALHES ===== -->
<div class="modal-overlay" id="modalDetalhes" onclick="fecharDetalhes(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2>📋 Detalhes do Pedido</h2>
        <div id="detalhesConteudo"></div>
        <button class="btn-fechar-modal" onclick="fecharDetalhes()">FECHAR</button>
    </div>
</div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="js/painel-config.js"></script>
<script src="js/painel-firebase.js"></script>
<script src="js/painel-app.js"></script>
<script src="js/painel-relatorios.js"></script>
<script src="js/painel-mensagens.js"></script>

</body>
</html>
